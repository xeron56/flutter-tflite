name: trocr
description: "A new Flutter project for TrOCR on-device inference."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  tflite_flutter:
    path: ../../
  image: ^4.0.17
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/encoder.tflite
    - assets/models/decoder.tflite
    - assets/models/vocab.json
